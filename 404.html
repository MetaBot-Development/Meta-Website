<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 | Lost in Space</title>
    <link rel="icon" type="image/x-icon" href="./images/meta.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <link rel="stylesheet" href="../css files/404.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <meta property="og:title" content="404">
    <meta property="og:description" content="Whoops! The page you're looking for has been consumed by a black hole. Even light can't escape. But don't worry, you can return to safety and explore the rest of the Meta universe!">
    <meta property="og:image" content="https://cdn.discordapp.com/emojis/1100753996622340166.webp?size=96">
    <meta property="og:url" content="https://botmeta.app/">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#000000">

</head>
<body>
    <div class="scanlines"></div>

    <canvas class="stars" id="starCanvas"></canvas>

    <div class="accretion-disk"></div>
    <div class="black-hole"></div>

    <div class="content">
        <div class="error-code" id="errorCode">404</div>
        <div class="subtitle">Lost in the Void</div>
        <p class="message">// the page you're looking for has been consumed by a black hole. even light can't escape.</p>
        <a href="home.html" class="home-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Return to Safety
        </a>
    </div>

    <div class="astronaut" id="astronaut">🧑‍🚀</div>

    <div class="coordinates" id="coords">X: 0000 Y: 0000</div>

    <div class="signal" id="signal">
        <div class="signal-bar" style="height: 6px;"></div>
        <div class="signal-bar" style="height: 10px;"></div>
        <div class="signal-bar" style="height: 14px;"></div>
        <div class="signal-bar" style="height: 18px;"></div>
        <div class="signal-bar" style="height: 22px;"></div>
    </div>

    <div class="distance" id="distance">DISTANCE FROM HOME: <span>0</span> light-years</div>

    <script>
        // === STAR FIELD ===
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const STAR_COUNT = 300;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.5 + 0.1,
                brightness: Math.random(),
                twinkleSpeed: Math.random() * 0.02 + 0.005
            });
        }

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        function drawStars(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                // Gravitational pull toward center (black hole effect)
                const dx = centerX - star.x;
                const dy = centerY - star.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 120) {
                    star.x += (dx / dist) * (80 / dist) * star.speed;
                    star.y += (dy / dist) * (80 / dist) * star.speed;
                } else {
                    // Respawn at edge
                    const edge = Math.floor(Math.random() * 4);
                    if (edge === 0) { star.x = 0; star.y = Math.random() * canvas.height; }
                    else if (edge === 1) { star.x = canvas.width; star.y = Math.random() * canvas.height; }
                    else if (edge === 2) { star.x = Math.random() * canvas.width; star.y = 0; }
                    else { star.x = Math.random() * canvas.width; star.y = canvas.height; }
                }
                
                // Twinkle
                const alpha = 0.4 + Math.sin(time * star.twinkleSpeed) * 0.3 + star.brightness * 0.3;
                
                // Stretch toward center when close
                const stretch = dist < 300 ? Math.max(1, (300 - dist) / 100) : 1;
                const angle = Math.atan2(dy, dx);
                
                ctx.save();
                ctx.translate(star.x, star.y);
                ctx.rotate(angle);
                ctx.scale(stretch, 1);
                ctx.beginPath();
                ctx.arc(0, 0, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 210, 255, ${alpha})`;
                ctx.fill();
                ctx.restore();
            });
            
            requestAnimationFrame(drawStars);
        }
        requestAnimationFrame(drawStars);

        // === ASTRONAUT CURSOR ===
        const astronaut = document.getElementById('astronaut');
        let astroX = mouseX, astroY = mouseY;
        let prevX = mouseX;
        let rotation = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function updateAstronaut() {
            // Smooth follow
            astroX += (mouseX - astroX) * 0.08;
            astroY += (mouseY - astroY) * 0.06;

            // Tilt based on movement direction
            const dir = mouseX - prevX;
            rotation += (dir * 0.8 - rotation) * 0.1;
            rotation = Math.max(-30, Math.min(30, rotation));
            prevX = mouseX;

            astronaut.style.left = (astroX - 20) + 'px';
            astronaut.style.top = (astroY - 20) + 'px';
            astronaut.style.transform = `rotate(${rotation}deg)`;

            // Update coordinates display
            document.getElementById('coords').innerHTML = 
                `X: ${String(Math.floor(astroX)).padStart(4, '0')} Y: ${String(Math.floor(astroY)).padStart(4, '0')}`;

            // Update distance from center
            const dist = Math.sqrt((astroX - centerX) ** 2 + (astroY - centerY) ** 2);
            const lightYears = (dist * 0.42).toFixed(1);
            document.getElementById('distance').innerHTML = 
                `DISTANCE FROM HOME: <span>${lightYears}</span> light-years`;

            // Update signal strength based on distance from center
            const bars = document.querySelectorAll('.signal-bar');
            const signalStrength = Math.min(5, Math.floor(dist / 80));
            bars.forEach((bar, i) => {
                bar.style.opacity = i < signalStrength ? '1' : '0.15';
            });

            requestAnimationFrame(updateAstronaut);
        }
        updateAstronaut();

        // === FLOATING DEBRIS ===
        const debrisEmojis = ['🛸', '🌑', '🪨', '⭐', '🔧', '📡', '💀', '🗝️'];
        function spawnDebris() {
            const el = document.createElement('div');
            el.className = 'debris';
            el.textContent = debrisEmojis[Math.floor(Math.random() * debrisEmojis.length)];
            
            const side = Math.floor(Math.random() * 4);
            let x, y, dx, dy;
            if (side === 0) { x = -30; y = Math.random() * window.innerHeight; dx = window.innerWidth + 60; dy = (Math.random() - 0.5) * 400; }
            else if (side === 1) { x = window.innerWidth + 30; y = Math.random() * window.innerHeight; dx = -(window.innerWidth + 60); dy = (Math.random() - 0.5) * 400; }
            else if (side === 2) { x = Math.random() * window.innerWidth; y = -30; dx = (Math.random() - 0.5) * 400; dy = window.innerHeight + 60; }
            else { x = Math.random() * window.innerWidth; y = window.innerHeight + 30; dx = (Math.random() - 0.5) * 400; dy = -(window.innerHeight + 60); }
            
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.setProperty('--dx', dx + 'px');
            el.style.setProperty('--dy', dy + 'px');
            
            const duration = 12 + Math.random() * 18;
            el.style.animationDuration = duration + 's';
            el.style.fontSize = (16 + Math.random() * 20) + 'px';
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), duration * 1000);
        }

        // Spawn debris periodically
        setInterval(spawnDebris, 3000);
        for (let i = 0; i < 5; i++) setTimeout(spawnDebris, i * 600);

        // === GLITCH THE 404 ON CLICK ===
        document.addEventListener('click', () => {
            const code = document.getElementById('errorCode');
            const glitchTexts = ['4̷0̸4̵', '4̶̢0̵̡4̸̧', 'E̷R̶R̸', '???', 'N/A', '404', ':(', '💀', '∞'];
            const original = code.textContent;
            let count = 0;
            const interval = setInterval(() => {
                code.textContent = glitchTexts[Math.floor(Math.random() * glitchTexts.length)];
                count++;
                if (count > 8) {
                    clearInterval(interval);
                    code.textContent = '404';
                }
            }, 80);
        });

        // === TOUCH SUPPORT ===
        document.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
    </script>
</body>
</html>
